name: Daily Flight Price Check

on:
  schedule:
    # 11:17 UTC = 7:17 AM EDT / 6:17 AM EST
    - cron: "17 11 * * *"
  workflow_dispatch: # allow manual trigger from GitHub UI

permissions:
  contents: read

jobs:
  scrape-and-alert:
    name: Scrape Flights & Send Alerts
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── Python setup ──────────────────────────────────────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        working-directory: apps/worker
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Playwright browsers
        working-directory: apps/worker
        run: python -m playwright install chromium --with-deps

      # ── Run scraper ────────────────────────────────────────────────────────
      - name: Run flight scraper
        working-directory: apps/worker
        run: python scraper.py
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          RAPIDAPI_KEY: ${{ secrets.RAPIDAPI_KEY }}
          SEATS_AERO_API_KEY: ${{ secrets.SEATS_AERO_API_KEY }}
          DATABASE_SSL: "true"

      # ── Upload logs ────────────────────────────────────────────────────────
      - name: Upload scraper logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: scraper-logs-${{ github.run_id }}
          path: apps/worker/logs/
          retention-days: 7
          if-no-files-found: ignore
