version: "3.9"

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: flighttracker
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    ports:
      - "5432:5432"

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@db:5432/flighttracker
      RAPIDAPI_KEY: ${RAPIDAPI_KEY:-}
      RAPIDAPI_MONTHLY_LIMIT: ${RAPIDAPI_MONTHLY_LIMIT:-10}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID:-}
      PROXY_LIST: ${PROXY_LIST:-}
      PLAYWRIGHT_HEADLESS: "true"
      SCHEDULER_HOUR_UTC: ${SCHEDULER_HOUR_UTC:-9}
      SCHEDULER_MINUTE_UTC: ${SCHEDULER_MINUTE_UTC:-0}
      RAPIDAPI_USAGE_FILE: /data/rapidapi_usage.json
    volumes:
      - backend_data:/data
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  dashboard:
    build:
      context: dashboard
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      NEXT_PUBLIC_API_URL: http://backend:8000
    ports:
      - "3000:3000"

volumes:
  pgdata:
  backend_data:
